<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <main>
    <h1>Products Page</h1>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Buying</th>
          <th>Selling</th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="prod in products">
          <td>{{prod["name"]}}</td>
          <td>{{prod["buying_price"]}}</td>
          <td>{{prod["selling_price"]}}</td>
        </tr>
      </tbody>
    </table>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.0/axios.js"></script>
  <script>
    new Vue({
      el: "#app",
      data: {
        products: [],
        name: "",
        buying_price: "",
        selling_price: "",
      },
      methods: {
        async getProducts() {
          try {
            const prods = await axios.get("http://127.0.0.1:5000/products");
            this.products = prods.data;
          } catch (error) {
            console.error("Error fetching products:", error)
          }
        }
      }
    })
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
</body>

</html>
